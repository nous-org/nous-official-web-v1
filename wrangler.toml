# wrangler.toml - Cloudflare Workers
name = "nous-cr"
compatibility_date = "2026-05-11"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

routes = [
  { pattern = "nous.cr/*", zone_name = "nous.cr" },
  { pattern = "www.nous.cr/*", zone_name = "nous.cr" },
]

[vars]
SITE_URL="https://nous.cr"
CONTACT_RECIPIENT_EMAIL="hello@nous.cr"
SUPPORT_EMAIL="support@nous.cr"
# Non-secret runtime vars such as CLERK_PUBLISHABLE_KEY, OPENAI_MODEL,
# OPENAI_CHATBOT_ENABLED, and OPENAI_CHATBOT_STORE_RESPONSES are configured
# in Cloudflare and preserved by deploys with keep_vars/--keep-vars.

# Runtime secrets must be configured in Cloudflare, not committed here.
# Required secrets:
# - RESEND_API_KEY
# - TURSO_DATABASE_URL
# - TURSO_AUTH_TOKEN
# - TURSO_NEWSLETTER_URL
# - TURSO_NEWSLETTER_TOKEN
# - CLERK_SECRET_KEY
# - CLERK_ADMIN_USER_IDS or CLERK_ADMIN_ORG_IDS/CLERK_ADMIN_ORG_ROLES or CLERK_ADMIN_SESSION_CLAIM
# - OPENAI_API_KEY

[[kv_namespaces]]
binding = "SESSION"
id = "f44753d9da9e4677a6e9cc500cc2d9cb"

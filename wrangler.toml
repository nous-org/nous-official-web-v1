name = "nous-official-web"
main = "dist/server/entry.mjs"
compatibility_date = "2023-10-01"
compatibility_flags = [ "nodejs_compat" ]

[build]
  command = "pnpm build"
  publish = "dist/client"

# KV Namespace for sessions (you need to create this in Cloudflare Dashboard first)
[[kv_namespaces]]
binding = "SESSION"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with your actual KV namespace ID
preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"  # Replace with your preview KV namespace ID

# Required for Cloudflare Pages with SSR
[site]
bucket = "dist/client"

# Environment configurations
[env.production]
name = "nous-official-web-production"
route = "nous.cr/*"
workers_dev = false

[env.preview]
name = "nous-official-web-preview"
route = "preview.nous.cr/*"
workers_dev = true
